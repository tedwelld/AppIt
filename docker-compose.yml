services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: appit-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "${APPIT_SQL_PORT:-1433}:1433"
    volumes:
      - appit_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: AppIt.Api/Dockerfile
    container_name: appit-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${APPIT_DB_NAME:-AppItDb};User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true;Encrypt=false;
      Auth__SeedAdminPassword: ${APPIT_ADMIN_PASSWORD:-Admin@2026}
      Payments__Stripe__SecretKey: ${STRIPE_SECRET_KEY:-REPLACE_WITH_STRIPE_SECRET_KEY}
      Payments__PayPal__ClientId: ${PAYPAL_CLIENT_ID:-REPLACE_WITH_PAYPAL_CLIENT_ID}
      Payments__PayPal__ClientSecret: ${PAYPAL_CLIENT_SECRET:-REPLACE_WITH_PAYPAL_CLIENT_SECRET}
      Payments__PayPal__Environment: ${PAYPAL_ENVIRONMENT:-Sandbox}
      Auth__JwtKey: ${APPIT_JWT_KEY:-AppIt-Docker-JwtSecretKey-MustBe32CharsOrMore!ChangeInProd}
    ports:
      - "${APPIT_API_PORT:-5175}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: AppIt.Web/Dockerfile
    container_name: appit-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APPIT_WEB_PORT:-4200}:80"
    restart: unless-stopped

volumes:
  appit_sql_data:
