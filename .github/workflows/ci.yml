name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore AppIt.Api/AppIt.Api.csproj
      - name: Build
        run: dotnet build AppIt.Api/AppIt.Api.csproj --no-restore -c Release
      - name: Test API
        run: dotnet test AppIt.Api.Tests/AppIt.Api.Tests.csproj -c Release --no-build
      - name: Test Core
        run: dotnet test AppIt.Core.Tests/AppIt.Core.Tests.csproj -c Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: AppIt.Web/package-lock.json
      - name: Install
        working-directory: AppIt.Web
        run: npm ci
      - name: Build
        working-directory: AppIt.Web
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose build
        run: docker compose build
